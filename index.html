<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamePulse</title>
  <style>
    :root {
      --bg1: #1e2433;
      --bg2: #2f1f44;
      --card: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --accent: #5b86da;
      --accent-hover: #79aadb;
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    .auth-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1, h2, h3 { margin-top: 0; }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 14px;
    }

    .field { margin-bottom: 12px; }

    input, select, button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
    }

    input, select {
      background: rgba(255, 255, 255, 0.95);
      color: #222;
    }

    button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s ease;
    }

    button:hover { background: var(--accent-hover); }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: rgba(0, 0, 0, 0.25);
      border-right: 1px solid var(--border);
      padding: 20px;
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid transparent;
      text-align: left;
    }

    .category-btn.active {
      border-color: rgba(255, 255, 255, 0.55);
      background: var(--accent);
    }

    .content {
      padding: 24px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
      align-items: center;
    }

    .search {
      padding: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      width: 100%;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .game-title { font-weight: 700; margin: 0 0 6px; }
    .game-meta { color: var(--muted); font-size: 13px; margin: 0; }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section id="auth" class="auth-wrap">
    <div class="card">
      <h1>GamePulse</h1>
      <p class="subtitle">Sign in to continue. (Any username/password works for now.)</p>
      <div class="field"><input id="username" type="text" placeholder="Username" /></div>
      <div class="field"><input id="password" type="password" placeholder="Password" /></div>
      <button id="signinBtn">Sign In</button>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">GamePulse</div>
      <h3>Categories</h3>
      <div class="category-list" id="categoryList"></div>
      <button id="logoutBtn" style="margin-top:14px;">Sign Out</button>
    </aside>

    <main class="content">
      <h2 id="categoryTitle">All Games</h2>
      <div class="toolbar">
        <input id="searchInput" class="search" type="text" placeholder="Search games..." />
        <select id="sortSelect" style="max-width: 220px;">
          <option value="az">Sort: A → Z</option>
          <option value="za">Sort: Z → A</option>
        </select>
      </div>
      <div id="gameList" class="game-list"></div>
    </main>
  </section>

  <script>
    const games = [
      { name: 'Apex Legends', category: 'Shooter' },
      { name: 'Counter-Strike 2', category: 'Shooter' },
      { name: 'Elden Ring', category: 'RPG' },
      { name: 'Stardew Valley', category: 'Simulation' },
      { name: 'Forza Horizon 5', category: 'Racing' },
      { name: 'Hades', category: 'Roguelike' },
      { name: 'Minecraft', category: 'Sandbox' },
      { name: 'Terraria', category: 'Sandbox' },
      { name: 'Balatro', category: 'Card' },
      { name: 'Slay the Spire', category: 'Card' }
    ];

    const categories = ['All', ...new Set(games.map(g => g.category))];

    const state = {
      category: 'All',
      query: '',
      sort: 'az'
    };

    const auth = document.getElementById('auth');
    const app = document.getElementById('app');
    const categoryList = document.getElementById('categoryList');
    const categoryTitle = document.getElementById('categoryTitle');
    const gameList = document.getElementById('gameList');

    function renderCategories() {
      categoryList.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn' + (cat === state.category ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
          state.category = cat;
          categoryTitle.textContent = cat === 'All' ? 'All Games' : cat + ' Games';
          renderCategories();
          renderGames();
        };
        categoryList.appendChild(btn);
      });
    }

    function renderGames() {
      let filtered = games.filter(g => (state.category === 'All' || g.category === state.category));
      if (state.query) {
        const q = state.query.toLowerCase();
        filtered = filtered.filter(g => g.name.toLowerCase().includes(q));
      }

      filtered.sort((a, b) => state.sort === 'az'
        ? a.name.localeCompare(b.name)
        : b.name.localeCompare(a.name));

      gameList.innerHTML = filtered.length
        ? filtered.map(g => `
          <article class="game-card">
            <p class="game-title">${g.name}</p>
            <p class="game-meta">Category: ${g.category}</p>
          </article>
        `).join('')
        : '<p class="subtitle">No games found for your current filters.</p>';
    }

    document.getElementById('signinBtn').addEventListener('click', () => {
      auth.classList.add('hidden');
      app.classList.remove('hidden');
      renderCategories();
      renderGames();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      app.classList.add('hidden');
      auth.classList.remove('hidden');
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      state.query = e.target.value.trim();
      renderGames();
    });

    document.getElementById('sortSelect').addEventListener('change', (e) => {
      state.sort = e.target.value;
      renderGames();
    });
  </script>
</body>
</html>

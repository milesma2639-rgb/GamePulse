<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePulse</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            color: white;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* ===== HOME VIEW ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(14px);
            padding: 20px 30px 16px;
            border-bottom: 2px solid rgba(233,69,96,0.35);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto 16px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, #e94560 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(233,69,96,0.4);
            cursor: pointer;
        }

        .tagline {
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            margin-top: 2px;
        }

        .search-container {
            flex: 1;
            min-width: 240px;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
        }

        #searchInput {
            padding: 12px 22px;
            width: 100%;
            border-radius: 25px;
            border: 2px solid rgba(233,69,96,0.3);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput::placeholder { color: rgba(255,255,255,0.5); }

        #searchInput:focus {
            border-color: #e94560;
            box-shadow: 0 0 16px rgba(233,69,96,0.4);
            background: rgba(0,0,0,0.55);
        }

        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 9px 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .category-btn:hover {
            background: rgba(233,69,96,0.25);
            border-color: rgba(233,69,96,0.5);
            transform: translateY(-1px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #e94560 0%, #c33656 100%);
            border-color: #e94560;
            box-shadow: 0 4px 12px rgba(233,69,96,0.4);
        }

        .main-content {
            padding: 30px 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-section { margin-bottom: 40px; }
        .category-section.hidden { display: none; }

        .category-header {
            color: white;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e94560;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
        }

        .category-header .count {
            font-size: 13px;
            font-weight: normal;
            color: rgba(255,255,255,0.55);
            margin-left: auto;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .game-btn {
            background: linear-gradient(135deg, rgba(233,69,96,0.15) 0%, rgba(15,52,96,0.4) 100%);
            border: 1px solid rgba(233,69,96,0.3);
            padding: 18px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: white;
            text-align: left;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            min-height: 60px;
            display: flex;
            align-items: center;
            font-family: inherit;
        }

        .game-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(233,69,96,0.4) 0%, rgba(15,52,96,0.6) 100%);
            border-color: #e94560;
            box-shadow: 0 6px 20px rgba(233,69,96,0.3);
        }

        .no-results {
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 40px;
            font-style: italic;
            font-size: 18px;
        }

        /* ===== PLAY VIEW ===== */
        #viewPlay.active {
            display: flex;
            flex-direction: column;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .play-topbar {
            height: 60px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(233,69,96,0.4);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        .play-logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #e94560 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            margin-right: 8px;
        }

        .play-divider {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.2);
        }

        .play-title {
            font-size: 17px;
            font-weight: 600;
            color: white;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .play-cat {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            font-weight: normal;
            margin-left: 8px;
        }

        .play-btn {
            background: linear-gradient(135deg, #e94560 0%, #c33656 100%);
            color: white;
            border: none;
            padding: 9px 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-family: inherit;
            text-decoration: none;
        }

        .play-btn:hover {
            background: linear-gradient(135deg, #ff5577 0%, #d44666 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(233,69,96,0.4);
        }

        .play-btn.secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .play-btn.secondary:hover {
            background: rgba(255,255,255,0.18);
            box-shadow: none;
        }

        .play-stage {
            flex: 1;
            position: relative;
            background: #000;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            transition: opacity 0.3s ease;
        }

        .overlay.hidden { opacity: 0; pointer-events: none; }

        .loader {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(233,69,96,0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .overlay-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .overlay-text {
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            max-width: 480px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .overlay-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .overlay-btn {
            background: linear-gradient(135deg, #e94560 0%, #c33656 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .overlay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(233,69,96,0.4);
        }
        .overlay-btn.secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .top-bar { padding: 14px 16px 12px; }
            .header-row { gap: 12px; }
            .logo { font-size: 28px; }
            .tagline { display: none; }
            .search-container { max-width: 100%; min-width: 100%; }
            .category-btn { padding: 7px 14px; font-size: 13px; }
            .main-content { padding: 20px 14px 40px; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
            .game-btn { padding: 14px; font-size: 13px; }
            .category-header { font-size: 22px; }
            .play-topbar { padding: 0 12px; gap: 8px; }
            .play-logo { font-size: 18px; }
            .play-title { font-size: 14px; }
            .play-cat { display: none; }
            .play-btn { padding: 8px 12px; font-size: 13px; }
            .play-btn .btn-label-long { display: none; }
        }
    </style>
</head>
<body>
    <div class="view active" id="viewHome">
        <div class="top-bar">
            <div class="header-row">
                <div>
                    <div class="logo" onclick="navigateHome()">GamePulse</div>
                    <div class="tagline">Your hub for the best browser games</div>
                </div>
                <div class="search-container">
                    <input type="text" placeholder="Search games..." id="searchInput" autocomplete="off">
                </div>
            </div>
            <div class="category-bar" id="categoryBar"></div>
        </div>
        <div class="main-content">
            <div id="sections-container"></div>
        </div>
    </div>

    <div class="view" id="viewPlay">
        <div class="play-topbar">
            <div class="play-logo" onclick="navigateHome()">GAMEPULSE</div>
            <div class="play-divider"></div>
            <div class="play-title" id="playTitle">Loading…<span class="play-cat" id="playCat"></span></div>
            <button class="play-btn secondary" onclick="toggleFullscreen()" title="Fullscreen">
                <span>⛶</span><span class="btn-label-long">Fullscreen</span>
            </button>
            <button class="play-btn" onclick="navigateHome()">
                <span>←</span><span class="btn-label-long">All Games</span>
            </button>
        </div>
        <div class="play-stage" id="playStage">
            <div class="overlay" id="loadingOverlay">
                <div class="loader"></div>
                <div class="overlay-title">Loading game…</div>
                <div class="overlay-text">Fetching the game files. This usually takes a few seconds.</div>
            </div>
            <div class="overlay hidden" id="errorOverlay">
                <div class="overlay-title">This game couldn't be loaded</div>
                <div class="overlay-text" id="errorText">
                    Something went wrong. You can try opening it directly.
                </div>
                <div class="overlay-btns">
                    <a id="openExternal" class="overlay-btn" target="_blank" rel="noopener">
                        <span>▶</span> Open Game
                    </a>
                    <button class="overlay-btn secondary" onclick="navigateHome()">
                        <span>←</span> Back to GamePulse
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'action',    name: 'Action' },
            { id: 'adventure', name: 'Adventure' },
            { id: 'arcade',    name: 'Arcade' },
            { id: 'puzzle',    name: 'Puzzle' },
            { id: 'racing',    name: 'Racing' },
            { id: 'shooting',  name: 'Shooting' },
            { id: 'sports',    name: 'Sports' },
            { id: 'strategy',  name: 'Strategy' },
            { id: 'io',        name: 'IO Games' },
            { id: 'casual',    name: 'Casual' },
            { id: 'other',     name: 'Other' }
        ];

        function ugsUrl(file) {
            const normalized = (file.includes('.') && file.lastIndexOf('.') > 0)
                ? file
                : file + '.html';
            return UGS_BASE + encodeURIComponent(normalized);
        }

        const viewHome = document.getElementById('viewHome');
        const viewPlay = document.getElementById('viewPlay');
        const categoryBar = document.getElementById('categoryBar');
        const sectionsContainer = document.getElementById('sections-container');
        const searchInput = document.getElementById('searchInput');
        const playStage = document.getElementById('playStage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const errorText = document.getElementById('errorText');
        const openExternal = document.getElementById('openExternal');

        let activeCategory = 'all';

        function buildCategoryBar() {
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn active';
            allBtn.dataset.category = 'all';
            allBtn.textContent = 'All Games';
            allBtn.onclick = () => filterCategory('all');
            categoryBar.appendChild(allBtn);
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.dataset.category = cat.id;
                btn.textContent = cat.name;
                btn.onclick = () => filterCategory(cat.id);
                categoryBar.appendChild(btn);
            });
        }

        function buildSections() {
            sectionsContainer.innerHTML = '';
            categories.forEach(cat => {
                const catGames = games.filter(g => g.category === cat.id);
                if (catGames.length === 0) return;
                const section = document.createElement('div');
                section.className = 'category-section';
                section.dataset.category = cat.id;
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span>${cat.name}</span><span class="count">${catGames.length} games</span>`;
                const grid = document.createElement('div');
                grid.className = 'games-grid';
                catGames.forEach(game => {
                    const btn = document.createElement('button');
                    btn.className = 'game-btn';
                    btn.textContent = game.name;
                    btn.dataset.name = game.name.toLowerCase();
                    btn.onclick = () => navigateToGame(game);
                    grid.appendChild(btn);
                });
                section.appendChild(header);
                section.appendChild(grid);
                sectionsContainer.appendChild(section);
            });
        }

        function filterCategory(catId) {
            activeCategory = catId;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === catId);
            });
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyFilters() {
            const term = searchInput.value.trim().toLowerCase();
            let totalVisible = 0;
            document.querySelectorAll('.category-section').forEach(section => {
                const catId = section.dataset.category;
                const categoryMatches = (activeCategory === 'all' || activeCategory === catId);
                let sectionVisibleCount = 0;
                section.querySelectorAll('.game-btn').forEach(btn => {
                    const matchesSearch = !term || btn.dataset.name.includes(term);
                    const visible = categoryMatches && matchesSearch;
                    btn.style.display = visible ? '' : 'none';
                    if (visible) sectionVisibleCount++;
                });
                section.classList.toggle('hidden', sectionVisibleCount === 0);
                totalVisible += sectionVisibleCount;
            });
            const existingNoResults = document.getElementById('no-results-msg');
            if (existingNoResults) existingNoResults.remove();
            if (totalVisible === 0) {
                const msg = document.createElement('div');
                msg.id = 'no-results-msg';
                msg.className = 'no-results';
                msg.textContent = `No games found${term ? ` for "${searchInput.value}"` : ''}.`;
                sectionsContainer.appendChild(msg);
            }
        }

        searchInput.addEventListener('input', applyFilters);

        /* ===== Routing ===== */
        function navigateToGame(game) {
            const catName = categories.find(c => c.id === game.category)?.name || game.category;
            const params = new URLSearchParams({
                name: game.name,
                file: game.file,
                cat: catName
            });
            window.location.hash = `#play?${params.toString()}`;
        }

        function navigateHome() {
            window.location.hash = '';
        }

        function showHome() {
            viewHome.classList.add('active');
            viewPlay.classList.remove('active');
            document.title = 'GamePulse';
            // tear down iframe to stop the game
            const oldFrame = document.getElementById('gameFrame');
            if (oldFrame) oldFrame.remove();
            document.body.style.overflow = '';
        }

        function showPlay(name, file, cat) {
            viewHome.classList.remove('active');
            viewPlay.classList.add('active');
            document.title = `GamePulse · ${name}`;
            document.getElementById('playTitle').firstChild.textContent = name + ' ';
            document.getElementById('playCat').textContent = cat ? `· ${cat}` : '';
            document.body.style.overflow = 'hidden';

            const url = ugsUrl(file);
            openExternal.href = url;
            errorText.textContent = 'Something went wrong. You can try opening it directly.';
            loadingOverlay.classList.remove('hidden');
            errorOverlay.classList.add('hidden');

            // clean up any previous iframe
            const oldFrame = document.getElementById('gameFrame');
            if (oldFrame) oldFrame.remove();

            const frame = document.createElement('iframe');
            frame.id = 'gameFrame';
            frame.allow = 'fullscreen *; autoplay *; gamepad *; microphone *; camera *; clipboard-write *; encrypted-media *; xr-spatial-tracking *; web-share *';
            frame.allowFullscreen = true;
            frame.referrerPolicy = 'no-referrer';
            playStage.appendChild(frame);

            let loaded = false;
            frame.addEventListener('load', () => {
                loaded = true;
                loadingOverlay.classList.add('hidden');
            });

            // jsdelivr serves UGS files as text/plain — fetch + srcdoc.
            fetch(url)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.text();
                })
                .then(html => {
                    const suppress = '<script>(function(){window.alert=function(m){console.warn("[GamePulse] suppressed alert:",m);};})();<\/script>';
                    if (/<head[^>]*>/i.test(html)) {
                        html = html.replace(/<head[^>]*>/i, m => m + suppress);
                    } else {
                        html = suppress + html;
                    }
                    frame.srcdoc = html;
                })
                .catch(err => {
                    errorText.textContent = `Couldn't load this game: ${err.message}`;
                    loadingOverlay.classList.add('hidden');
                    errorOverlay.classList.remove('hidden');
                });

            setTimeout(() => {
                if (!loaded) {
                    loadingOverlay.classList.add('hidden');
                    errorOverlay.classList.remove('hidden');
                }
            }, 15000);
        }

        function toggleFullscreen() {
            const target = document.getElementById('gameFrame') || playStage;
            if (!document.fullscreenElement) {
                target.requestFullscreen?.();
            } else {
                document.exitFullscreen?.();
            }
        }

        function route() {
            const hash = window.location.hash;
            if (hash.startsWith('#play?')) {
                const params = new URLSearchParams(hash.substring(6));
                const name = params.get('name');
                const file = params.get('file');
                const cat = params.get('cat') || '';
                if (name && file) {
                    showPlay(name, file, cat);
                    return;
                }
            }
            showHome();
        }

        window.addEventListener('hashchange', route);

        buildCategoryBar();
        buildSections();
        route();
    </script>
